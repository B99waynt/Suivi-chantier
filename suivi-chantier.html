
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi Chantier - Technicombles</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            margin: 0;
            font-size: 2em;
        }
        .logo-placeholder {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: inline-block;
            margin-right: 15px;
            vertical-align: middle;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status.a-faire { background: #ffeaa7; color: #fdcb6e; }
        .status.en-cours { background: #fd79a8; color: white; }
        .status.termine { background: #00b894; color: white; }
        input[type="search"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center;">
            <div class="logo-placeholder">LOGO</div>
            <h1>Suivi Travaux - Noé-Cléry</h1>
        </div>
        <p>Chantier combles & rénovation | Technicombles</p>
    </header>

    <input type="search" id="search" placeholder="Rechercher tâches, lots, responsables...">

    <div class="stats" id="stats">
        <!-- Stats générées par JS -->
    </div>

    <table id="taskTable">
        <thead>
            <tr>
                <th>Réf</th>
                <th>Lot</th>
                <th>Tâche</th>
                <th>Responsable</th>
                <th>Statut</th>
                <th>Priorité</th>
            </tr>
        </thead>
        <tbody>
            <!-- Données générées par JS -->
        </tbody>
    </table>

    <script>
        const tasks = [
            ['1.1', 'Démolition', 'Démolition grange', 'Équipe A', 'À faire', 'Haute'],
            ['1.2', 'Gros œuvre', 'Fondations', 'Équipe B', 'En cours', 'Moyenne'],
            ['2.1', 'Menuiseries', 'Poser volets', 'Menuisier', 'Terminé', 'Basse'],
            ['2.2', 'Chauffage', 'Cheminée - tubage', 'Plombier', 'À faire', 'Haute'],
            ['3.1', 'Finitions', 'Peinture murs', 'Peintre', 'En cours', 'Moyenne']
        ];

        function getStatusClass(status) {
            const classes = { 'À faire': 'a-faire', 'En cours': 'en-cours', 'Terminé': 'termine' };
            return classes[status] || '';
        }

        function renderTable(filteredTasks) {
            const tbody = document.querySelector('#taskTable tbody');
            const statsDiv = document.getElementById('stats');
            tbody.innerHTML = '';

            const stats = {
                total: filteredTasks.length,
                afaire: filteredTasks.filter(t => t[4] === 'À faire').length,
                encours: filteredTasks.filter(t => t[4] === 'En cours').length,
                termine: filteredTasks.filter(t => t[4] === 'Terminé').length
            };

            statsDiv.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${stats.total}</div>
                    <div>Total tâches</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.afaire}</div>
                    <div>À faire</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.encours}</div>
                    <div>En cours</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.termine}</div>
                    <div>Terminé</div>
                </div>
            `;

            filteredTasks.forEach(task => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${task[0]}</td>
                    <td>${task[1]}</td>
                    <td>${task[2]}</td>
                    <td>${task[3]}</td>
                    <td><span class="status ${getStatusClass(task[4])}">${task[4]}</span></td>
                    <td>${task[5]}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = tasks.filter(task =>
                task.some(cell => cell.toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        // Rendu initial
        renderTable(tasks);
    </script>
</body>
</html>
