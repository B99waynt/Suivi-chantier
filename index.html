<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi Chantier - Technicombles</title>
  <style>
    :root {
      --red-main: #b12028;      /* Rouge Technicombles */
      --red-soft: #e95151;
      --grey-dark: #444444;
      --grey-light: #f5f5f7;
      --bg-body: #f3f4f7;
      --radius-card: 14px;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: var(--bg-body);
      color: #222;
      padding: 24px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto 40px auto;
    }

    /* HEADER ------------------------------------------------------ */

    header {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-top: 4px solid var(--red-main);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      height: 70px;
      width: auto;
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.4rem;
      color: var(--grey-dark);
    }

    .title-block p {
      margin: 2px 0 0 0;
      font-size: 0.9rem;
      color: #777;
    }

    .header-right {
      text-align: right;
      font-size: 0.85rem;
      color: #777;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--grey-light);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    /* STATS ------------------------------------------------------- */

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
