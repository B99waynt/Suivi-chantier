<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi Chantier - Technicombles</title>
  <style>
    :root {
      --red-main: #b12028;
      --grey-dark: #444444;
      --grey-light: #f5f5f7;
      --bg-body: #f3f4f7;
      --radius-card: 14px;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-body);
      color: #222;
      padding: 24px;
    }
    .app { max-width: 1200px; margin: 0 auto 40px auto; }

    header {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-top: 4px solid var(--red-main);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { height: 70px; width: auto; }
    .title-block h1 { margin: 0; font-size: 1.4rem; color: var(--grey-dark); }
    .title-block p { margin: 2px 0 0 0; font-size: 0.9rem; color: #777; }
    .header-right { text-align: right; font-size: 0.85rem; color: #777; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--grey-light);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #ffffff;
      border-radius: var(--radius-card);
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 4px solid transparent;
    }
    .stat-card.total { border-left-color: var(--grey-dark); }
    .stat-card.afaire { border-left-color: var(--red-main); }
    .stat-card.encours { border-left-color: #ff9800; }
    .stat-card.terminees { border-left-color: #2e7d32; }
    .stat-label { font-size: 0.9rem; color: #777; margin-bottom: 6px; }
    .stat-number { font-size: 1.8rem; font-weight: 600; color: var(--grey-dark); }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      justify-content: space-between;
    }
    .toolbar-left {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    select,
    input[type="search"],
    input[type="file"] {
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 8px 12px;
      font-size: 0.9rem;
      background: #fff;
    }
    input[type="search"] { min-width: 220px; flex: 1; }
    .btn-import {
      border-radius: 999px;
      border: 2px solid var(--red-main);
      background: var(--red-main);
      color: white;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-import:hover { background: #8e1a1f; }
    #fileInput { display: none; }

    .table-wrapper {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: var(--grey-light); }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    th { font-weight: 600; color: #555; font-size: 0.85rem; }
    tbody tr:hover { background: #fafafa; }
    td.tache { white-space: normal; max-width: 320px; }

    .pill-select {
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 4px 8px;
      font-size: 0.8rem;
      background: #fff;
    }
    .comment-input {
      width: 200px;
      max-width: 100%;
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 4px 8px;
      font-size: 0.8rem;
    }

    @media (max-width: 900px) {
      body { padding: 12px; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .header-right { align-self: stretch; text-align: left; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      th:nth-child(2), td:nth-child(2) { display: none; }
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-left { width: 100%; }
      input[type="search"] { width: 100%; }
    }
  </style>

  <!-- XLSX pour l'import Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <img src="technicombles_logo_small.jpg" alt="Technicombles" class="logo" />
        <div class="title-block">
          <h1>Suivi des travaux – Noé Cléry</h1>
          <p>Technicombles – Aménagement des combles et rénovation</p>
        </div>
      </div>
      <div class="header-right">
        <div class="badge">Chantier interne</div>
        <div>Dernière mise à jour : <span id="lastUpdate"></span></div>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card total">
        <div class="stat-label">Total tâches</div>
        <div class="stat-number" id="statTotal">0</div>
      </div>
      <div class="stat-card afaire">
        <div class="stat-label">À faire</div>
        <div class="stat-number" id="statAFaire">0</div>
      </div>
      <div class="stat-card encours">
        <div class="stat-label">En cours</div>
        <div class="stat-number" id="statEnCours">0</div>
      </div>
      <div class="stat-card terminees">
        <div class="stat-label">Terminées</div>
        <div class="stat-number" id="statTerminees">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <button class="btn-import" id="importBtn">
          📂 Importer DPGF
        </button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" />

        <select id="filterStatut">
          <option value="">Tous les statuts</option>
          <option value="À faire">À faire</option>
          <option value="En cours">En cours</option>
          <option value="Terminée">Terminée</option>
        </select>

        <select id="filterLot">
          <option value="">Tous les lots</option>
        </select>

        <select id="filterIntervenant">
          <option value="">Tous les intervenants</option>
        </select>
      </div>

      <input
        type="search"
        id="searchInput"
        placeholder="Rechercher une tâche, un lot, un intervenant..."
      />
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Réf</th>
            <th>Lot</th>
            <th>Tâche</th>
            <th>Intervenant</th>
            <th>Statut</th>
            <th>Priorité</th>
            <th>Commentaire</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // ---- CONFIG SUPABASE (tes vraies valeurs) ----
    const SUPABASE_URL = "https://ifhvgqvmwgtyzuoyjbby.supabase.co";
    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmaHZncXZtd2d0eXp1b3lqYmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTkxOTYsImV4cCI6MjA4ODI5NTE5Nn0.y4JuWxVM8-r6VsCafPyIkwsawwHPa2FPqlxGzKIX580";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const intervenantsOptions = [
      "Non assigné",
      "Techni Combles",
      "Home Work Peinture",
      "Pro Martins",
      "Interelec",
      "Tiago",
      "HK Menuiserie",
    ];
    const statutOptions = ["À faire", "En cours", "Terminée"];
    const prioriteOptions = ["Basse", "Moyenne", "Haute"];

    let tasks = []; // {id, ref, lot, task, intervenant, statut, priorite, commentaire}

    const tableBody = document.getElementById("tableBody");
    const statTotal = document.getElementById("statTotal");
    const statAFaire = document.getElementById("statAFaire");
    const statEnCours = document.getElementById("statEnCours");
    const statTerminees = document.getElementById("statTerminees");
    const searchInput = document.getElementById("searchInput");
    const filterStatut = document.getElementById("filterStatut");
    const filterLot = document.getElementById("filterLot");
    const filterIntervenant = document.getElementById("filterIntervenant");
    const lastUpdateSpan = document.getElementById("lastUpdate");
    const fileInput = document.getElementById("fileInput");
    const importBtn = document.getElementById("importBtn");

    const now = new Date();
    lastUpdateSpan.textContent = now.toLocaleString("fr-FR", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });

    function guessLot(ref) {
      if (!ref) return "Lot inconnu";
      const num = ref.toString().split(".")[0];
      const lotMap = {
        "0": "Lot 0 - Préparation",
        "1": "Lot 1 - Démolition et GO",
        "2": "Lot 2 - Maçonnerie",
        "3": "Lot 3 - Plomberie",
        "4": "Lot 4 - Électricité",
        "5": "Lot 5 - Ventilation",
        "6": "Lot 6 - Menuiseries Ext",
        "7": "Lot 7 - Menuiseries Int",
        "8": "Lot 8 - Parquet",
        "9": "Lot 9 - Peinture",
      };
      return lotMap[num] || "Lot " + num;
    }

    function normalizeStatut(val) {
      const v = (val || "").toLowerCase().trim();
      if (v.includes("faire")) return "À faire";
      if (v.includes("cours")) return "En cours";
      if (v.includes("termin")) return "Terminée";
      return "À faire";
    }

    function guessPriorite(desc, remarques) {
      const txt = ((desc || "") + " " + (remarques || "")).toLowerCase();
      if (txt.includes("urgent") || txt.includes("priorit")) return "Haute";
      if (txt.includes("option")) return "Basse";
      return "Moyenne";
    }

    function renderLotsOptions() {
      filterLot.innerHTML = '<option value="">Tous les lots</option>';
      const lots = Array.from(new Set(tasks.map((t) => t.lot))).sort();
      lots.forEach((lot) => {
        const opt = document.createElement("option");
        opt.value = lot;
        opt.textContent = lot;
        filterLot.appendChild(opt);
      });
    }

    function renderIntervenantFilterOptions() {
      filterIntervenant.innerHTML = '<option value="">Tous les intervenants</option>';
      const uniques = Array.from(new Set(tasks.map((t) => t.intervenant))).sort();
      uniques.forEach((name) => {
        if (!name) return;
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        filterIntervenant.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = searchInput.value.toLowerCase();
      const statut = filterStatut.value;
      const lotVal = filterLot.value;
      const intervVal = filterIntervenant.value;

      return tasks.filter((t) => {
        if (statut && t.statut !== statut) return false;
        if (lotVal && t.lot !== lotVal) return false;
        if (intervVal && t.intervenant !== intervVal) return false;
        if (!q) return true;
        const str =
          (t.ref +
            t.lot +
            t.task +
            t.intervenant +
            t.statut +
            t.priorite +
            (t.commentaire || "")).toLowerCase();
        return str.includes(q);
      });
    }

    async function updateTaskField(id, field, value) {
      try {
        await supabaseClient
          .from("taches_noe_clery")
          .update({ [field]: value, updated_at: new Date().toISOString() })
          .eq("id", id);
      } catch (e) {
        console.error("Erreur update", e);
        alert("Erreur lors de la sauvegarde Supabase.");
      }
    }

    function render() {
      const filtered = applyFilters();
      tableBody.innerHTML = "";

      filtered.forEach((t) => {
        const tr = document.createElement("tr");

        const tdRef = document.createElement("td");
        tdRef.textContent = t.ref;

        const tdLot = document.createElement("td");
        tdLot.textContent = t.lot;

        const tdTask = document.createElement("td");
        tdTask.textContent = t.task;
        tdTask.className = "tache";

        // Intervenant
        const tdInterv = document.createElement("td");
        const selectInterv = document.createElement("select");
        selectInterv.className = "pill-select";
        intervenantsOptions.forEach((optVal) => {
          const opt = document.createElement("option");
          opt.value = optVal;
          opt.textContent = optVal;
          if (optVal === t.intervenant) opt.selected = true;
          selectInterv.appendChild(opt);
        });
        selectInterv.addEventListener("change", async (e) => {
          t.intervenant = e.target.value;
          await updateTaskField(t.id, "intervenant", t.intervenant);
          renderIntervenantFilterOptions();
        });
        tdInterv.appendChild(selectInterv);

        // Statut
        const tdStatut = document.createElement("td");
        const selectStatut = document.createElement("select");
        selectStatut.className = "pill-select";
        statutOptions.forEach((optVal) => {
          const opt = document.createElement("option");
          opt.value = optVal;
          opt.textContent = optVal;
          if (optVal === t.statut) opt.selected = true;
          selectStatut.appendChild(opt);
        });
        selectStatut.addEventListener("change", async (e) => {
          t.statut = e.target.value;
          await updateTaskField(t.id, "statut", t.statut);
          render();
        });
        tdStatut.appendChild(selectStatut);

        // Priorité
        const tdPriorite = document.createElement("td");
        const selectPriorite = document.createElement("select");
        selectPriorite.className = "pill-select";
        prioriteOptions.forEach((optVal) => {
          const opt = document.createElement("option");
          opt.value = optVal;
          opt.textContent = optVal;
          if (optVal === t.priorite) opt.selected = true;
          selectPriorite.appendChild(opt);
        });
        selectPriorite.addEventListener("change", async (e) => {
          t.priorite = e.target.value;
          await updateTaskField(t.id, "priorite", t.priorite);
        });
        tdPriorite.appendChild(selectPriorite);

        // Commentaire
        const tdComment = document.createElement("td");
        const inputComment = document.createElement("input");
        inputComment.type = "text";
        inputComment.value = t.commentaire || "";
        inputComment.className = "comment-input";
        inputComment.addEventListener("change", async (e) => {
          t.commentaire = e.target.value;
          await updateTaskField(t.id, "commentaire", t.commentaire);
        });
        tdComment.appendChild(inputComment);

        tr.appendChild(tdRef);
        tr.appendChild(tdLot);
        tr.appendChild(tdTask);
        tr.appendChild(tdInterv);
        tr.appendChild(tdStatut);
        tr.appendChild(tdPriorite);
        tr.appendChild(tdComment);

        tableBody.appendChild(tr);
      });

      statTotal.textContent = filtered.length;
      statAFaire.textContent = filtered.filter((t) => t.statut === "À faire").length;
      statEnCours.textContent = filtered.filter((t) => t.statut === "En cours").length;
      statTerminees.textContent = filtered.filter((t) => t.statut === "Terminée").length;
    }

    async function loadTasksFromSupabase() {
      const { data, error } = await supabaseClient
        .from("taches_noe_clery")
        .select("*")
        .order("ref", { ascending: true });

      if (error) {
        console.error(error);
        alert("Erreur chargement Supabase");
        return;
      }

      tasks = data || [];
      renderLotsOptions();
      renderIntervenantFilterOptions();
      render();
    }

    async function replaceTasksInSupabase(newTasks) {
      // on efface tout puis on insère
      await supabaseClient.from("taches_noe_clery").delete().neq("id", 0);
      const { error } = await supabaseClient
        .from("taches_noe_clery")
        .insert(
          newTasks.map((t) => ({
            ref: t.ref,
            lot: t.lot,
            task: t.task,
            intervenant: t.intervenant,
            statut: t.statut,
            priorite: t.priorite,
            commentaire: t.commentaire,
          }))
        );
      if (error) {
        console.error(error);
        alert("Erreur lors de l’enregistrement dans Supabase");
      }
    }

    importBtn.addEventListener("click", async () => {
      const confirmReset = confirm(
        "Importer le DPGF va remplacer toutes les tâches existantes dans la base.\n\nContinuer ?"
      );
      if (!confirmReset) return;
      fileInput.click();
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (event) => {
        try {
          const data = new Uint8Array(event.target.result);
          const workbook = XLSX.read(data, { type: "array" });

          const sheetNames = workbook.SheetNames;
          let foundTasks = [];

          sheetNames.forEach((sheetName) => {
            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            let headerRowIndex = -1;
            for (let i = 0; i < json.length; i++) {
              const row = json[i];
              const firstCol = (row[0] || "").toString().toLowerCase();
              if (firstCol.includes("rf") || firstCol.includes("réf")) {
                headerRowIndex = i;
                break;
              }
            }
            if (headerRowIndex === -1) return;

            const headers = json[headerRowIndex].map((h) =>
              (h || "").toString().toLowerCase().trim()
            );

            const refIdx = headers.findIndex((h) => h.includes("rf") || h.includes("réf"));
            const descIdx = headers.findIndex((h) =>
              h.includes("description") || h.includes("tche")
            );
            const responsableIdx = headers.findIndex((h) => h.includes("responsable"));
            const statutIdx = headers.findIndex((h) => h.includes("statut"));
            const remarquesIdx = headers.findIndex((h) =>
              h.includes("remarque") || h.includes("observation")
            );

            for (let i = headerRowIndex + 1; i < json.length; i++) {
              const row = json[i];
              const ref = row[refIdx] || "";
              const desc = row[descIdx] || "";
              if (!ref || !desc) continue;
              if (ref.toString().includes("---")) continue;

              const responsable = row[responsableIdx] || "Non assigné";
              const statut = row[statutIdx] || "À faire";
              const remarques = row[remarquesIdx] || "";

              foundTasks.push({
                ref: ref.toString(),
                lot: guessLot(ref),
                task: desc.toString(),
                intervenant:
                  responsable.toString().toLowerCase() === "à faire" ||
                  responsable.toString().toLowerCase() === "faire"
                    ? "Non assigné"
                    : responsable.toString(),
                statut: normalizeStatut(statut),
                priorite: guessPriorite(desc, remarques),
                commentaire: remarques.toString(),
              });
            }
          });

          if (foundTasks.length === 0) {
            alert("Aucune tâche trouvée dans le fichier Excel.");
            return;
          }

          await replaceTasksInSupabase(foundTasks);
          await loadTasksFromSupabase();
          alert(`✅ ${tasks.length} tâches importées et sauvegardées dans Supabase.`);
        } catch (err) {
          console.error(err);
          alert("Erreur lors de la lecture du fichier Excel.");
        }
      };
      reader.readAsArrayBuffer(file);
    });

    searchInput.addEventListener("input", render);
    filterStatut.addEventListener("change", render);
    filterLot.addEventListener("change", render);
    filterIntervenant.addEventListener("change", render);

    // Chargement initial depuis Supabase
    loadTasksFromSupabase();
  </script>
</body>
</html>
