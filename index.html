<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suivi Chantier - Technicombles</title>
  <style>
    :root {
      --red-main: #b12028;
      --grey-dark: #444444;
      --grey-light: #f5f5f7;
      --bg-body: #f3f4f7;
      --radius-card: 14px;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-body);
      color: #222;
      padding: 24px;
    }
    .app { max-width: 1200px; margin: 0 auto 40px auto; }

    header {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      border-top: 4px solid var(--red-main);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo { height: 70px; width: auto; }
    .title-block h1 { margin: 0; font-size: 1.4rem; color: var(--grey-dark); }
    .title-block p { margin: 2px 0 0 0; font-size: 0.9rem; color: #777; }
    .header-right { text-align: right; font-size: 0.85rem; color: #777; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--grey-light);
      font-size: 0.8rem;
      margin-bottom: 6px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #ffffff;
      border-radius: var(--radius-card);
      padding: 14px 16px;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-left: 4px solid transparent;
    }
    .stat-card.total { border-left-color: var(--grey-dark); }
    .stat-card.afaire { border-left-color: var(--red-main); }
    .stat-card.encours { border-left-color: #ff9800; }
    .stat-card.terminees { border-left-color: #2e7d32; }
    .stat-label { font-size: 0.9rem; color: #777; margin-bottom: 6px; }
    .stat-number { font-size: 1.8rem; font-weight: 600; color: var(--grey-dark); }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .toolbar-group { display: flex; gap: 8px; flex-wrap: wrap; }
    select,
    input[type="search"] {
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 8px 12px;
      font-size: 0.9rem;
      background: #fff;
    }
    input[type="search"] { min-width: 220px; flex: 1; }

    .table-wrapper {
      background: #ffffff;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead { background: var(--grey-light); }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }
    th { font-weight: 600; color: #555; font-size: 0.85rem; }
    tbody tr:hover { background: #fafafa; }
    td.tache { white-space: normal; max-width: 320px; }

    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-afaire { background: #fff4e5; color: #e65100; }
    .status-encours { background: #fff0f6; color: #d81b60; }
    .status-termine { background: #e6f4ea; color: #2e7d32; }

    .priority {
      font-weight: 500;
      font-size: 0.8rem;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .priority-haute {
      color: var(--red-main);
      border-color: var(--red-main);
      background: #fff5f5;
    }
    .priority-moyenne {
      color: #ef6c00;
      border-color: #ef6c00;
      background: #fff3e0;
    }
    .priority-basse {
      color: #607d8b;
      border-color: #607d8b;
      background: #eceff1;
    }

    .intervenant-select {
      border-radius: 999px;
      border: 1px solid #ddd;
      padding: 4px 8px;
      font-size: 0.8rem;
      background: #fff;
    }

    @media (max-width: 900px) {
      body { padding: 12px; }
      header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .header-right { align-self: stretch; text-align: left; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      th:nth-child(2), td:nth-child(2) { display: none; }
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar-group { width: 100%; }
      input[type="search"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <img src="technicombles_logo_small.jpg" alt="Technicombles" class="logo" />
        <div class="title-block">
          <h1>Suivi des travaux – Noé Cléry</h1>
          <p>Technicombles – Aménagement des combles et rénovation</p>
        </div>
      </div>
      <div class="header-right">
        <div class="badge">Chantier interne</div>
        <div>Dernière mise à jour : <span id="lastUpdate"></span></div>
      </div>
    </header>

        <div class="stat-number" id="statTotal">0</div>
      </div>
      <div class="stat-card afaire">

        <div class="stat-number" id="statAFaire">0</div>
      </div>
      <div class="stat-card encours">
        <div class="stat-label">En cours</div>
        <div class="stat-number" id="statEnCours">0</div>
      </div>
      <div class="stat-card terminees">
        <div class="stat-label">Terminées</div>
        <div class="stat-number" id="statTerminees">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-group">
        <select id="filterStatut">

          <option value="À faire">À faire</option>
          <option value="En cours">En cours</option>
          <option value="Terminée">Terminée</option>
        </select>

        <select id="filterLot">
          <option value="">Tous les lots</option>
        </select>
      </div>

        id="searchInput"
        placeholder="Rechercher
